services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: moneyflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      # Host 5433 avoids clashing with a local PostgreSQL install on 5432.
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d moneyflow']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  nest-backend:
    build:
      context: ./nest-backend
    restart: unless-stopped
    env_file:
      - ./nest-backend/.env.example
    environment:
      # Inside Compose, DB/Redis are service names — not localhost:5433.
      DATABASE_URL: postgresql://postgres:root@postgres:5432/moneyflow
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:4000/api/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
