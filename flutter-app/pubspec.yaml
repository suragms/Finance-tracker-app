name: moneyflow_ai
description: MoneyFlow AI — finance tracker client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  file_picker: ^8.1.4
  pdfx: ^2.9.2
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.4
  path: ^1.9.0
  connectivity_plus: ^6.1.0
  uuid: ^4.5.1
  telephony: ^0.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
