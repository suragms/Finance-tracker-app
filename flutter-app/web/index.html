<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you serve the app under a subpath, build with:
    flutter build web --base-href /your-path/
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Hexpenses — personal finance: expenses, budgets, and accounts.">

  <!-- PWA / install -->
  <meta name="theme-color" content="#0f766e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hexpenses">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Hexpenses</title>

  <!--
    Nest API (global prefix /api).
    - Local dev (localhost): uses http://127.0.0.1:4000/api
    - Any other host (e.g. Vercel): uses production API below
    Override before this block if needed: window.MONEYFLOW_API_BASE = 'https://your-api.onrender.com/api';
  -->
  <script>
    (function () {
      if (window.MONEYFLOW_API_BASE && String(window.MONEYFLOW_API_BASE).trim()) return;
      var h = window.location.hostname;
      var isLocal = h === 'localhost' || h === '127.0.0.1' || h === '[::1]';
      window.MONEYFLOW_API_BASE = isLocal
        ? 'http://localhost:4000/api'
        : 'https://hexpenses-api.onrender.com/api';
    })();
  </script>
</head>
<body>
  <!-- pdfx: expose pdf.js on globalThis before Flutter registers the web plugin -->
  <script type="module">
    const ns = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs');
    const pdfjsLib = ns.default ?? ns;
    globalThis.pdfjsLib = pdfjsLib;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.mjs';
    globalThis.pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/cmaps/',
      cMapPacked: true,
    };
  </script>
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
